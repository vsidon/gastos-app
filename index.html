<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060b14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GastoRápido</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#00b4ff;--blue2:#0066ff;--blue3:rgba(0,180,255,0.15);
  --green:#00e5a0;--red:#ff4d6d;--yellow:#ffd166;--purple:#b388ff;
  --bg:#060b14;--bg1:#0d1525;--bg2:#111d30;--bg3:#162038;
  --glass:rgba(255,255,255,0.05);--glass2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.08);--border2:rgba(0,180,255,0.25);
  --text:#e8f0fe;--text2:#94a3b8;--text3:#4a5568;
  --mono:'JetBrains Mono','Fira Mono','Consolas',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;height:100%;overflow:hidden;}
.blobs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;}
.b1{width:350px;height:350px;background:#0066ff;top:-80px;right:-80px;}
.b2{width:250px;height:250px;background:#00e5a0;bottom:15%;left:-60px;}
.b3{width:200px;height:200px;background:#7c3aed;top:50%;right:0;}
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.topbar{flex-shrink:0;padding:12px 16px 8px;background:rgba(6,11,20,0.9);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tb-brand{font-size:14px;font-weight:700;color:var(--blue);letter-spacing:1px;font-family:var(--mono);}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-kpi-val{font-size:14px;font-weight:700;color:var(--yellow);font-family:var(--mono);}
.tb-kpi-lbl{font-size:9px;color:var(--text2);letter-spacing:.5px;text-align:right;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sync-dot.ok{background:var(--green);animation:pulse 2s infinite;}
.sync-dot.err{background:var(--red);animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{flex-shrink:0;display:flex;background:rgba(6,11,20,0.95);border-bottom:0.5px solid var(--border);}
.tab{flex:1;padding:11px 4px;background:none;border:none;color:var(--text2);font-family:var(--mono);font-size:10px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.panel{display:none;flex:1;overflow-y:auto;flex-direction:column;}
.panel.active{display:flex;}
.panel::-webkit-scrollbar{width:2px;}
.panel::-webkit-scrollbar-thumb{background:var(--border);}
/* REGISTRAR */
.reg-top{flex-shrink:0;padding:14px 14px 10px;}
.amount-display{background:var(--glass);border:0.5px solid var(--border2);border-radius:16px;padding:14px 20px;margin-bottom:10px;text-align:center;}
.amount-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:4px;font-family:var(--mono);}
.amount-val{font-size:40px;font-weight:700;color:var(--blue);font-family:var(--mono);line-height:1;transition:color .2s;}
.amount-val.has-val{color:var(--yellow);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.np-btn{background:var(--glass2);border:0.5px solid var(--border);border-radius:12px;padding:14px 8px;font-size:20px;font-weight:600;color:var(--text);font-family:var(--mono);cursor:pointer;text-align:center;transition:all .1s;-webkit-user-select:none;user-select:none;}
.np-btn:active{background:var(--blue3);border-color:var(--border2);transform:scale(0.95);}
.np-btn.del{font-size:16px;color:var(--text2);}
.np-btn.ok{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;border-color:transparent;font-size:13px;letter-spacing:.5px;}
.np-btn.ok:active{opacity:.85;}
.reg-scroll{flex:1;overflow-y:auto;padding:0 14px 20px;display:flex;flex-direction:column;gap:14px;}
.sec-title{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:0.5px;background:var(--border);}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cat-btn{background:var(--glass);border:0.5px solid var(--border);border-radius:12px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none;}
.cat-btn:active{transform:scale(0.94);}
.cat-btn.selected{background:rgba(0,180,255,0.1);border-color:var(--border2);}
.cat-btn.selected .cat-icon{color:var(--cat-color,var(--blue));}
.cat-btn.selected .cat-name{color:var(--cat-color,var(--blue));}
.cat-icon{display:flex;justify-content:center;color:var(--text3);}
.cat-name{font-size:9px;color:var(--text2);letter-spacing:.3px;font-family:var(--mono);}
textarea.nota-input{background:var(--glass);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:var(--mono);font-size:13px;width:100%;outline:none;resize:none;}
textarea.nota-input:focus{border-color:var(--border2);}
textarea.nota-input::placeholder{color:var(--text3);}
.btn-reg{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;border:none;border-radius:14px;padding:16px;font-size:14px;font-weight:700;font-family:var(--mono);cursor:pointer;letter-spacing:1px;text-transform:uppercase;width:100%;transition:all .15s;}
.btn-reg:active{opacity:.85;transform:scale(0.98);}
/* TOAST */
.toast{position:fixed;top:74px;left:50%;transform:translateX(-50%) translateY(-16px);background:rgba(0,229,160,0.12);border:0.5px solid rgba(0,229,160,0.4);color:var(--green);font-family:var(--mono);font-size:12px;padding:10px 20px;border-radius:20px;opacity:0;transition:all .3s;z-index:500;white-space:nowrap;backdrop-filter:blur(12px);pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:rgba(255,77,109,0.12);border-color:rgba(255,77,109,0.4);color:var(--red);}
/* HISTORIAL */
.hist-panel{padding:14px;display:flex;flex-direction:column;gap:8px;}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.hist-title{font-size:11px;color:var(--text2);font-family:var(--mono);}
.hist-clear{background:none;border:0.5px solid rgba(255,77,109,0.3);color:var(--red);font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:6px;cursor:pointer;}
.hist-item{background:var(--glass);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.hist-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center;}
.hist-body{flex:1;min-width:0;}
.hist-cat{font-size:12px;font-weight:600;font-family:var(--mono);}
.hist-nota{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.hist-time{font-size:10px;color:var(--text3);font-family:var(--mono);}
.hist-right{text-align:right;flex-shrink:0;}
.hist-amt{font-size:15px;font-weight:700;color:var(--yellow);font-family:var(--mono);}
.hist-sync{font-size:9px;margin-top:2px;}
.hist-sync.ok{color:var(--green);}
.hist-sync.pen{color:var(--text3);}
.hist-empty{color:var(--text2);font-size:12px;font-family:var(--mono);text-align:center;padding:40px 0;}
.hist-desc{font-size:12px;font-weight:600;color:var(--text);font-family:var(--mono);}
.hist-meta{font-size:10px;color:var(--text2);margin-top:2px;font-family:var(--mono);}
.hist-sync{color:var(--green);}
.empty{display:flex;flex-direction:column;align-items:center;gap:8px;padding:40px 0;color:var(--text2);font-family:var(--mono);font-size:12px;}
/* CONFIG */
.cfg-panel{padding:14px;display:flex;flex-direction:column;gap:12px;}
.cfg-card{background:var(--glass);border:0.5px solid var(--border);border-radius:14px;padding:14px;}
.cfg-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;font-family:var(--mono);}
.cfg-input{background:var(--bg2);border:0.5px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;padding:10px 12px;border-radius:10px;width:100%;outline:none;margin-bottom:8px;}
.cfg-input:focus{border-color:var(--border2);}
.cfg-btn{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;border:none;border-radius:10px;padding:10px;font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;width:100%;}
.cfg-btn.danger{background:linear-gradient(135deg,#c0392b,var(--red));margin-top:0;}
.cfg-stat{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
.cfg-stat-val{font-size:14px;font-weight:700;color:var(--blue);font-family:var(--mono);}
.cfg-link{display:block;text-align:center;padding:12px;background:var(--glass2);border:0.5px solid var(--border2);border-radius:10px;color:var(--blue);font-family:var(--mono);font-size:11px;text-decoration:none;letter-spacing:.5px;}
</style>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/gastos-app/sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if(sw.state === 'installed' && navigator.serviceWorker.controller){
          // Nueva versión disponible — recargar automático
          window.location.reload();
        }
      });
    });
  });
}
</script>
</head>

function gw(d){const d2=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=d2.getUTCDay()||7;d2.setUTCDate(d2.getUTCDate()+4-dn);const ys=new Date(Date.UTC(d2.getUTCFullYear(),0,1));return Math.ceil((((d2-ys)/86400000)+1)/7);}
function mxn(v){return'$'+Math.round(v).toLocaleString('es-MX');}
function uBar(pct,color,w=16){const f=Math.round((pct/100)*w),e=w-f;return`<span style="color:${color}">${'█'.repeat(f)}</span><span style="color:var(--bg4)">${'█'.repeat(e)}</span>`;}

// ── INIT ──
function init(){
  document.getElementById('stWeek').textContent = gw(new Date());
  if(scriptURL){
    document.getElementById('cfgUrl').value = scriptURL;
    updateStatusDot('ok','conectado a google sheets ✓');
    document.getElementById('syncBadge').textContent='● sheets';
    document.getElementById('syncBadge').className='tb-badge';
    document.getElementById('infoSync').textContent='activo ✓';
    document.getElementById('infoSync').style.color='var(--green)';
  } else {
    updateStatusDot('pending','sin configurar');
  }
  renderHist();renderCfg();updatePill();
  document.getElementById('cfgTotal').textContent = gastos.length;
}

// ── NUMPAD ──
function np(v){
  if(v==='del') numDel();
  else numPress(v);
}
function numPress(v){
  if(v==='.'&&amountStr.includes('.'))return;
  if(amountStr.includes('.')){const dec=amountStr.split('.')[1];if(dec&&dec.length>=2)return;}
  if(amountStr==='0'&&v!='.')amountStr=v;
  else amountStr+=v;
  if(amountStr.length>8)return;
  updateAmountDisplay();
}
function numDel(){amountStr=amountStr.slice(0,-1);updateAmountDisplay();}
function updateAmountDisplay(){
  const el=document.getElementById('amountDisplay');
  const val=parseFloat(amountStr)||0;
  el.textContent=val>0?mxn(val):'$0';
  el.className='amount-val'+(val>0?' has-val':'');
}

// ── CATEGORY ──
function selectCat(el){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  selectedCat=el.dataset.cat;
  const sl=document.getElementById('selCatLabel');if(sl)sl.textContent=selectedCat;
}

// ── SUBMIT ──
async function submitGasto(){
  const amount=parseFloat(amountStr);
  if(!amount||amount<=0){shakeDisplay();return;}
  const note=document.getElementById('noteInput').value.trim();
  const gasto={id:Date.now(),fecha:new Date().toISOString(),categoria:selectedCat,monto:amount,nota:note,synced:false};
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='enviando...';
  gastos.unshift(gasto);
  localStorage.setItem('gastos_vs',JSON.stringify(gastos));
  if(scriptURL){
    try{
      await fetch(scriptURL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({categoria:selectedCat,monto:amount,nota:note})});
      gasto.synced=true;localStorage.setItem('gastos_vs',JSON.stringify(gastos));
    }catch(e){}
  }
  amountStr='';updateAmountDisplay();
  document.getElementById('noteInput').value='';
  btn.disabled=false;btn.textContent='REGISTRAR GASTO';
  renderHist();renderCfg();updatePill();
  document.getElementById('cfgTotal').textContent=gastos.length;
  showFlash('-'+mxn(amount),selectedCat+(note?' · '+note:''));
}

// ── FLASH ──
function showFlash(t,s){
  document.getElementById('toast').textContent=t;
  document.getElementById('flashSub').textContent=s;
  document.getElementById('toast').classList.add('show');
  setTimeout(()=>document.getElementById('toast').classList.remove('show'),1800);
}
function shakeDisplay(){
  const el=document.getElementById('amountDisplay');
  el.style.transform='translateX(-8px)';
  setTimeout(()=>el.style.transform='translateX(8px)',80);
  setTimeout(()=>el.style.transform='none',160);
}

// ── HISTORY ──
function fmtFechaApp(raw){
  try{
    const d=new Date(raw);if(isNaN(d))return raw;
    return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short'})+' '+
      d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  }catch(e){return raw;}
}

const APPS_URL='https://script.google.com/macros/s/AKfycbzQkG54L0T9uZRK4x9KEGJdb4jnFq5W7KqLMZUNOJwqrzpG2j10mQUBIS8HK0crf3lqOw/exec';

async function renderHist(){
  const list=document.getElementById('histList');
  const url=scriptURL||APPS_URL;
  list.innerHTML='<div class="empty"><span style="font-size:11px;color:var(--text2);font-family:var(--mono)">cargando...</span></div>';
  try{
    const r=await fetch(url+'?action=getAll',{redirect:'follow'});
    const json=await r.json();
    if(json.status!=='ok'||!Array.isArray(json.data))throw new Error('sin data');
    // Combinar Sheets + localStorage (localStorage primero = más recientes no sincronizados)
    const sheetsRows=json.data.map(c=>{
      const fecha=c[0]||'';
      return{fecha,hora:(c[1]||''),cat:c[2]||'',monto:parseFloat(c[3])||0,nota:c[4]||'',synced:true};
    }).filter(r=>r.monto>0);
    // Gastos locales no sincronizados
    const localPending=gastos.filter(g=>!g.synced);
    const allRows=[...localPending,...sheetsRows];
    document.getElementById('histCount').textContent=allRows.length;
    if(!allRows.length){
      list.innerHTML='<div class="empty"><span>📭</span><span style="font-size:11px">sin gastos aún</span></div>';
      return;
    }
    list.innerHTML=allRows.slice(0,50).map(g=>{
      const cat=g.cat||g.categoria||'Otro';
      const color=CAT_COLORS[cat]||'#94a3b8';
      const icon=CAT_ICONS[cat]||CAT_ICONS.Otro;
      return`<div class="hist-item">
        <div style="width:36px;height:36px;border-radius:10px;background:${color}22;border:1.5px solid ${color}55;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-family:var(--mono);color:${color};letter-spacing:0;font-weight:700">${cat.substring(0,3).toUpperCase()}</div>
        <div class="hist-body">
          <div class="hist-desc" style="color:${color}">${cat}</div>
          <div class="hist-meta">${g.nota||'—'} · ${fmtFechaApp(g.fecha)}</div>
        </div>
        <div class="hist-right">
          <div class="hist-amt">-${mxn(g.monto)}</div>
          <div class="hist-sync ok">☁ sheets</div>
        </div>
      </div>`;
    }).join('');
  }catch(err){
    // Fallback a localStorage
    document.getElementById('histCount').textContent=gastos.length;
    if(!gastos.length){
      list.innerHTML='<div class="empty"><span>📭</span><span style="font-size:11px">sin gastos aún</span></div>';
      return;
    }
    list.innerHTML=gastos.slice(0,40).map(g=>{
      const cat=g.cat||g.categoria||'Otro';
      const color=CAT_COLORS[cat]||'#94a3b8';
      const icon=CAT_ICONS[cat]||CAT_ICONS.Otro;
      return`<div class="hist-item">
        <div style="width:36px;height:36px;border-radius:10px;background:${color}22;border:1.5px solid ${color}55;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-family:var(--mono);color:${color};letter-spacing:0;font-weight:700">${cat.substring(0,3).toUpperCase()}</div>
        <div class="hist-body">
          <div class="hist-desc" style="color:${color}">${cat}</div>
          <div class="hist-meta">${g.nota||'—'} · ${fmtFechaApp(g.fecha)}</div>
        </div>
        <div class="hist-right">
          <div class="hist-amt">-${mxn(g.monto)}</div>
          <div class="hist-sync pen">📱 local</div>
        </div>
      </div>`;
    }).join('');
  }
}

// ── RESUMEN ──
function renderCfg(){
  const now=new Date(),hoy=now.toDateString();
  const lun=new Date(now);lun.setDate(now.getDate()-((now.getDay()+6)%7));lun.setHours(0,0,0,0);
  let h=0,s=0;const pc={};
  gastos.forEach(g=>{
    const d=new Date(g.fecha);
    if(d.toDateString()===hoy)h+=g.monto;
    if(d>=lun)s+=g.monto;
    pc[g.categoria]=(pc[g.categoria]||0)+g.monto;
  });
  document.getElementById('cfgHoy').textContent=mxn(h);
  document.getElementById('cfgSem').textContent=mxn(s);
  document.getElementById('cfgTotal').textContent=gastos.length;
  document.getElementById('cfgLibre').textContent=mxn(Math.max(0,LIBRE_SEMANAL-s));
  const bars=document.getElementById('progressBars') || {innerHTML:''};
  bars.innerHTML=Object.entries(PRESUP).map(([cat,budget])=>{
    const spent=pc[cat]||0,pct=Math.min(100,(spent/budget)*100),over=pct>=100;
    const col=over?'#f38ba8':(CAT_COLORS[cat]||'#6c7086');
    return`<div class="ubar-row">
      <div class="ubar-lbl" style="display:flex;align-items:center;justify-content:flex-end;gap:4px;color:var(--text3)">${CAT_ICONS[cat]||""}<span>${cat.toLowerCase()}</span></div>
      <div class="ubar-track">${uBar(pct,col)}</div>
      <div class="ubar-val" style="color:${col}">${mxn(spent)}</div>
    </div>`;
  }).join('');
}

// ── PILL ──
function updatePill(){
  const hoy=new Date().toDateString();
  const t=gastos.filter(g=>new Date(g.fecha).toDateString()===hoy).reduce((s,g)=>s+g.monto,0);
  document.getElementById('pillHoy').textContent=mxn(t);
}

// ── TABS ──
function swTab(name, el){
  const map = {reg:'registrar', hist:'historial', cfg:'config'};
  const names = ['reg','hist','cfg'];
  names.forEach(n=>{
    document.getElementById('panel-'+n).className='panel'+(n===name?' active':'');
  });
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.className='tab'+(names[i]===name?' active':'');
  });
  if(name==='hist') renderHist();
  if(name==='cfg') renderCfg();
}
function switchTab(name){ swTab(name); }

// ── CONFIG ──
async function saveUrl(){
  const url=document.getElementById('cfgUrl').value.trim();
  if(!url.startsWith('https://script.google.com')){updateStatusDot('err','url inválida');return;}
  updateStatusDot('pending','probando conexión...');
  try{
    await fetch(url,{mode:'no-cors'});
    scriptURL=url;localStorage.setItem('script_url_vs',url);
    updateStatusDot('ok','conectado ✓');
    document.getElementById('syncBadge').textContent='● sheets';
    document.getElementById('syncBadge').className='tb-badge';
    document.getElementById('infoSync').textContent='activo ✓';
    document.getElementById('infoSync').style.color='var(--green)';
  }catch(e){updateStatusDot('err','error de conexión');}
}
function updateStatusDot(s,t){
  document.getElementById('syncDot').className='sdot '+s;
  document.getElementById('statusText').textContent=t;
}
function clearData(){
  if(!confirm('¿Borrar todos los gastos locales?'))return;
  gastos=[];localStorage.removeItem('gastos_vs');
  renderHist();renderCfg();updatePill();
  document.getElementById('cfgTotal').textContent=0;
}

init();

</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/gastos-app/sw.js')
    .then(r => {
      r.addEventListener('updatefound', () => {
        const w = r.installing;
        w.addEventListener('statechange', () => {
          if(w.state==='installed' && navigator.serviceWorker.controller){
            // Nueva versión disponible — recargar automático
            window.location.reload();
          }
        });
      });
    });
}
</script>
